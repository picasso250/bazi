<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字查询</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>八字查询</h1>

        <form id="combinedQueryForm">
            <fieldset>
                <legend>输入时间 (UTC+8)</legend>
                <div class="input-group time-inputs-group">
                    <div>
                        <label for="year">年份:</label>
                        <input type="number" id="year" value="1989" min="1900" max="2100" required>
                    </div>
                    <div>
                        <label for="month">月份:</label>
                        <input type="number" id="month" value="2" min="1" max="12" required>
                    </div>
                    <div>
                        <label for="day">日期:</label>
                        <input type="number" id="day" value="22" min="1" max="31" required>
                    </div>
                    <div>
                        <label for="hour">小时:</label>
                        <input type="number" id="hour" value="0" min="0" max="23" required>
                    </div>
                    <div>
                        <label for="minute">分钟:</label>
                        <input type="number" id="minute" value="5" min="0" max="59" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>城市与基本信息</legend>
                <div class="input-group full-width">
                    <div class="radio-group-city-type">
                        <input type="radio" id="cityType_domestic" name="cityType" value="domestic" checked>
                        <label for="cityType_domestic">中国大陆城市</label>
                        <input type="radio" id="cityType_overseas" name="cityType" value="overseas">
                        <label for="cityType_overseas">海外及港澳台城市</label>
                    </div>
                </div>

                <!-- Domestic City Selection (Initially visible) -->
                <div id="domesticCitySelection" class="input-group full-width city-select-group">
                    <div>
                        <label for="provinceSelect">省份/直辖市:</label>
                        <select id="provinceSelect" required></select>
                    </div>
                    <div>
                        <label for="cityCountySelect">城市/区县:</label>
                        <select id="cityCountySelect" required></select>
                    </div>
                </div>

                <!-- Overseas City Selection (Initially hidden) -->
                <div id="overseasCitySelection" class="input-group full-width" style="display: none;">
                    <div>
                        <label for="cityInput">城市名称 (例如: Shanghai):</label>
                        <input type="text" id="cityInput" placeholder="请输入城市名称" value="">
                    </div>
                </div>

                <div class="input-group gender-select full-width">
                    <label>性别:</label>
                    <div class="radio-group-gender">
                        <input type="radio" id="gender_male" name="gender" value="male" checked required>
                        <label for="gender_male">男 (Male)</label>

                        <input type="radio" id="gender_female" name="gender" value="female" required>
                        <label for="gender_female">女 (Female)</label>
                    </div>
                </div>
            </fieldset>

            <button type="submit">查询</button>
        </form>

        <div id="errorMessage" class="error-message"></div>

        <div id="result" class="result" style="display: none;">
            <p>输入时间 (UTC+8): <strong id="inputTimeUTC8"></strong></p>
            <p>查询城市: <strong id="cityNameDisplay"></strong> (<strong id="countryCodeDisplay"></strong>)</p>
            <p>纬度: <strong id="latitudeDisplay"></strong>, 经度: <strong id="longitudeDisplay"></strong></p>
            <p>当地时间: <strong id="localTimeDisplay"></strong></p>
            <p>太阳黄经: <strong id="solarLongitude"></strong> 度</p>

            <!-- 四柱显示改为横向布局 (只保留这一套新的结构) -->
            <div class="bazi-pillars-container">
                <div class="bazi-pillar-item">
                    <p class="pillar-label">年柱</p>
                    <p class="pillar-ganzhi" id="yearPillarGanZhiDisplay"></p>
                    <p class="pillar-tengod" id="yearPillarTenGodDisplay"></p>
                </div>
                <div class="bazi-pillar-item">
                    <p class="pillar-label">月柱</p>
                    <p class="pillar-ganzhi" id="monthPillarGanZhiDisplay"></p>
                    <p class="pillar-tengod" id="monthPillarTenGodDisplay"></p>
                </div>
                <div class="bazi-pillar-item">
                    <p class="pillar-label">日柱</p>
                    <p class="pillar-ganzhi" id="dayPillarGanZhiDisplay"></p>
                    <p class="pillar-tengod" id="dayPillarTenGodDisplay"></p>
                </div>
                <div class="bazi-pillar-item">
                    <p class="pillar-label">时柱</p>
                    <p class="pillar-ganzhi" id="hourPillarGanZhiDisplay"></p>
                    <p class="pillar-tengod" id="hourPillarTenGodDisplay"></p>
                </div>
            </div>

            <h3>四柱藏干</h3>
            <div style="display: flex; justify-content: space-around; text-align: center; margin-top: 20px;">
                <div style="flex: 1;">
                    <p>年支藏干</p>
                    <div id="yearBranchHiddenStems"></div> <!-- 缺失的ID已添加 -->
                </div>
                <div style="flex: 1;">
                    <p>月支藏干</p>
                    <div id="monthBranchHiddenStems"></div> <!-- 缺失的ID已添加 -->
                </div>
                <div style="flex: 1;">
                    <p>日支藏干</p>
                    <div id="dayBranchHiddenStems"></div> <!-- 缺失的ID已添加 -->
                </div>
                <div style="flex: 1;">
                    <p>时支藏干</p>
                    <div id="hourBranchHiddenStems"></div> <!-- 缺失的ID已添加 -->
                </div>
            </div>

            <h3 style="margin-top: 30px;">大运与流年</h3>
            <p>大运方向: <strong id="grandCycleDirectionDisplay"></strong></p>
            <p>起运岁数: <strong id="grandCycleStartAgeDisplay"></strong></p>
            <div id="grandCyclesDisplay" class="grand-cycles-container">
                <!-- 大运会在这里动态生成 -->
            </div>
            <p style="margin-top: 20px;">当前流年 (<span id="currentGregorianYearDisplay"></span>): <strong id="currentYearPillarDisplay"></strong></p>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
